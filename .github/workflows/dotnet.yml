# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Checkout LB.Utility
      uses: actions/checkout@v4
      with:
        repository: melance/LB.Utility
        path: LB.Utility
        token: ${{secrets.GITHUB_TOKEN}}
    - name: Checkout DiceRoller
      uses: actions/checkout@v4
      with:
        repository: melance/DiceRoller
        path: DiceRoller
        token: ${{secrets.GITHUB_TOKEN}}
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: dotnet restore src/TheRandomizer.slnx
    - name: Build
      run: dotnet build src/TheRandomizer.slnx --configuration Release --no-restore
    - name: Test
      run: dotnet test src/TheRandomizer.slnx --no-build --verbosity normal
